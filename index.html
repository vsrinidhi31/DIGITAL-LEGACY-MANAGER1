<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Legacy Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="landing-container">
        <header>
            <h1>Digital Legacy Manager</h1>
            <p>Secure your digital assets for the future.</p>
        </header>

        <main class="auth-box">
            <div class="tabs">
                <button id="tab-login" class="active" onclick="showForm('login')">Login</button>
                <button id="tab-register" onclick="showForm('register')">Register</button>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="primary-btn">Sign In</button>
                <p id="login-error" class="error"></p>
            </form>

            <form id="register-form" style="display: none;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit" class="primary-btn">Create Account</button>
                <p id="reg-error" class="error"></p>
            </form>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
